services:
  sarah-backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "3000:3000"
    networks:
      - sarah

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../widget/dist:/usr/share/nginx/html/widget:ro
    depends_on:
      - sarah-backend
    networks:
      - sarah

networks:
  sarah:
