<h2>Sarah — Systemarchitektur</h2>
<p class="subtitle">Übersicht aller Komponenten und Datenflüsse</p>

<div class="mockup">

      <text x="130" y="95" text-anchor="middle" font-size="10" fill="#999">localStorage Chat-History</text>

      <!-- Arrow: Browser → Backend -->
      <defs>

          <polygon points="0 0, 10 3.5, 0 7" fill="#006AAB"/>
        </marker>

      <line x1="230" y1="70" x2="340" y2="70" stroke="#006AAB" stroke-width="2" marker-end="url(#arrow)"/>

      <text x="620" y="40" text-anchor="middle" font-size="9" fill="#006AAB">API Call</text>

      <text x="775" y="158" text-anchor="middle" font-size="10" fill="#1C2740">Produkte, Förderung, Service</text>

      <text x="460" y="250" text-anchor="middle" font-size="11" fill="#666">Leads, Deals, Aktivitäten</text>

      <text x="280" y="158" font-size="9" fill="#999">Notification</text>

      <rect x="320" y="355" width="260" height="36" rx="12" fill="#E58434"/>
      <rect x="320" y="375" width="260" height="16" fill="#E58434"/>

      <text x="340" y="413" font-size="10" fill="#1C2740">• Treppe (innen/außen)</text>
      <text x="340" y="430" font-size="10" fill="#1C2740">• Verlauf (gerade/kurvig)</text>
      <text x="340" y="447" font-size="10" fill="#1C2740">• Gebäude & Lift-Typ</text>
      <text x="340" y="464" font-size="10" fill="#1C2740">• Kontaktdaten erfassen</text>
      <text x="340" y="481" font-size="10" fill="#E58434">→ Lead in Pipedrive erstellen</text>

      <rect x="610" y="355" width="260" height="140" rx="12" fill="white" stroke="#1C2740" stroke-width="2"/>

      <rect x="610" y="375" width="260" height="16" fill="#1C2740"/>

      <text x="630" y="413" font-size="10" fill="#1C2740">• Problem beschreiben</text>
      <text x="630" y="430" font-size="10" fill="#1C2740">• Kundendaten erfassen</text>
      <text x="630" y="447" font-size="10" fill="#1C2740">• Wartungsanfrage</text>
      <text x="630" y="464" font-size="10" fill="#1C2740">• Garantiefragen</text>
      <text x="630" y="481" font-size="10" fill="#1C2740">→ Pipedrive Aktivität + E-Mail</text>
